name: Build and deploy Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      mwe_version:
        description: minecraft-web-export release tag (empty = ci/build.env)
        required: false
        default: ""
      renderer_version:
        description: emi-recipe-renderer npm version (empty = ci/build.env)
        required: false
        default: ""
      optimize_version:
        description: emi-bundle-optimize npm version (empty = ci/build.env)
        required: false
        default: ""
      modpack_tag:
        description: Modpack-Modern semver tag (empty = latest release)
        required: false
        default: ""
      export_warmup_ticks:
        description: Ticks after EMI is ready before export (empty = ci/build.env)
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # --- Fast prep (fail cheap before MC export / optimize) ---
      - name: Checkout viewer
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load CI config
        run: bash scripts/ci-load-config.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prep Node (npm ci)
        env:
          OPTIMIZE_VER: ${{ github.event.inputs.optimize_version || env.OPTIMIZE_VERSION }}
          RENDERER_VER: ${{ github.event.inputs.renderer_version || env.RENDERER_VERSION }}
        run: bash scripts/ci-prep-node.sh

      # --- Modpack + MC export (slow) ---
      - name: Checkout Modpack-Modern
        id: modpack
        env:
          MODPACK_TAG: ${{ github.event.inputs.modpack_tag }}
        run: |
          chmod +x scripts/ci-checkout-modpack.sh
          if [ -n "${MODPACK_TAG:-}" ]; then
            export MODPACK_TAG
          fi
          bash scripts/ci-checkout-modpack.sh

      - name: Prepare bundle metadata
        id: metadata
        env:
          MODPACK_TAG: ${{ steps.modpack.outputs.modpack_tag }}
        run: bash scripts/ci-prepare-metadata.sh

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install xvfb + OpenGL + OpenAL Soft
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb x11-xserver-utils \
            libgl1 libgl1-mesa-dri \
            libopenal1

      - name: Fetch modpack mods (pakku)
        working-directory: ${{ env.MODPACK_DIR }}
        run: java -jar pakku.jar fetch

      - name: Install minecraft-web-export
        env:
          MWE_TAG: ${{ github.event.inputs.mwe_version || env.MWE_VERSION }}
        run: bash scripts/ci-install-mwe.sh

      - name: Restore HeadlessMC .minecraft
        id: hmc-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: hmc-${{ env.MC_VERSION }}-forge-${{ env.FORGE_BUILD }}
          restore-keys: |
            hmc-${{ env.MC_VERSION }}-forge-
            hmc-${{ env.MC_VERSION }}-

      - name: Restore emi-export save
        id: emi-save-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: emi-export-${{ env.MC_VERSION }}-${{ hashFiles(format('{0}/pakku-lock.json', env.MODPACK_DIR)) }}
          restore-keys: |
            emi-export-${{ env.MC_VERSION }}-

      - name: Setup HeadlessMC
        run: bash scripts/ci-setup-hmc.sh

      - name: Launch modpack and verify EMI export
        env:
          ALSOFT_DRIVERS: "null"
          EXPORT_WARMUP: ${{ github.event.inputs.export_warmup_ticks || env.EXPORT_WARMUP_TICKS }}
          MWE_JVM_FLAGS: >-
            -Xmx12G
            -Xms4G
            -XX:+UseG1GC
            -Djava.awt.headless=false
            -Dmodernfix.config.mixin.feature.integrated_server_watchdog=false
            -DminecraftWebExport.export.enabled=true
            -DminecraftWebExport.runExportAndExit=true
            -DminecraftWebExport.export.outputDir=${{ env.EXPORT_RAW }}
            -DminecraftWebExport.exportWarmupTicks=${{ env.EXPORT_WARMUP }}
            -DminecraftWebExport.exportTimeoutSeconds=${{ env.EXPORT_TIMEOUT_SECONDS }}
        run: bash scripts/ci-launch-mc-export.sh

      - name: Save emi-export world cache
        if: success() && steps.emi-save-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: ${{ steps.emi-save-restore.outputs.cache-primary-key }}

      - name: Save HeadlessMC .minecraft
        if: success() && steps.hmc-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: ${{ steps.hmc-restore.outputs.cache-primary-key }}

      # --- Optimize + finalize site (needs export on disk) ---
      - name: Optimize bundle
        run: |
          bash scripts/ci-verify-emi-bundle.sh
          npx emi-bundle-optimize optimize \
            --in "${{ env.EXPORT_BUNDLE }}" \
            --out "${{ env.EXPORT_OPT_STAGING }}" \
            --force \
            --prune-lang

      - name: Install bundle into site
        run: |
          npm run copy -- --id "${{ steps.metadata.outputs.bundle_id }}" "${{ env.EXPORT_OPT_STAGING }}"
          npm run validate

      - name: Build debug — collect
        if: failure()
        run: bash scripts/ci-collect-export-debug.sh --phase optimize

      - name: Build debug — upload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: ci-debug/
          if-no-files-found: ignore

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
