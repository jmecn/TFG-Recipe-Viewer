name: Deploy Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "ci/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      modpack_tag:
        description: Modpack Release Tag
        required: false
        default: ""
  workflow_run:
    workflows: ["Export EMI bundle"]
    types: [completed]
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Load Config
        run: bash scripts/ci.sh load-config

      - name: Download Exported Metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: export-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Resolve Versions
        id: metadata
        env:
          MODPACK_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.modpack_tag || '' }}
        run: bash scripts/ci.sh print-versions

      - name: Fetch Web UI
        run: bash scripts/ci.sh fetch-viewer-site

      - name: Download raw bundle artifact from triggering Export
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: emi-raw-${{ steps.metadata.outputs.bundle_id }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract raw bundle (Export workflow_run artifact)
        if: github.event_name == 'workflow_run'
        env:
          BUNDLE_ID: ${{ steps.metadata.outputs.bundle_id }}
        run: bash scripts/ci.sh extract-raw-bundle

      - name: Download raw bundle from latest Export (manual / push)
        if: github.event_name != 'workflow_run'
        env:
          BUNDLE_ID: ${{ steps.metadata.outputs.bundle_id }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash scripts/ci.sh fetch-raw-bundle

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Optimize Bundle
        env:
          BUNDLE_ID: ${{ steps.metadata.outputs.bundle_id }}
        run: |
          bash scripts/ci.sh prep-node
          bash scripts/ci.sh verify-emi-bundle
          bash scripts/ci.sh optimize-and-stage

      - name: Prepare Pages
        env:
          BUNDLE_ID: ${{ steps.metadata.outputs.bundle_id }}
        run: bash scripts/ci.sh prep-deploy-site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
