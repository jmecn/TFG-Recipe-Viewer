<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Viewer</title>
  <meta name="emi-renderer-version" content="0.4.1">
  <script src="site-base.js"></script>
  <link id="emi-style" rel="stylesheet" href="">
  <link rel="stylesheet" href="styles.css?v=20">
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const version = params.get('emiVersion')
        || document.querySelector('meta[name="emi-renderer-version"]').content;
      const useLocal = params.get('cdn') === 'local' || params.get('cdn') === '0';
      const isDev = params.get('dev') === '1';
      const cssFile = isDev ? 'emi.css' : 'emi.min.css';
      const link = document.getElementById('emi-style');
      link.href = useLocal
        ? siteUrl('lib/' + cssFile)
        : 'https://cdn.jsdelivr.net/npm/emi-recipe-renderer@' + version + '/dist/' + cssFile;
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-brand" href="#" data-site-home title="Recipe Viewer home">
        <span class="site-name">Recipe Viewer</span>
      </a>

      <div class="site-search">
        <label class="site-search-field">
          <span class="site-search-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="8.5" cy="8.5" r="5.25" stroke="currentColor" stroke-width="1.6"/>
              <path d="M12.5 12.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <input id="filter-input" type="search" placeholder="Filter…" autocomplete="off" class="site-search-input">
        </label>
      </div>

      <div class="site-header-actions">
        <label class="header-control header-control--locale">
          <span class="header-control-label">lang:</span>
          <select id="locale-select" class="header-select" aria-label="Language"></select>
        </label>
        <label class="header-control header-control--bundle">
          <span class="header-control-label">bundle:</span>
          <select id="bundle-select" class="header-select" aria-label="Export bundle"></select>
        </label>
      </div>
    </div>
    <p id="demo-error" class="demo-error" hidden></p>
  </header>

  <main class="demo-main">
    <section id="panel-items" class="demo-panel" hidden data-panel="items">
      <div id="item-grid" class="item-grid"></div>
      <nav id="item-pager" class="list-pager" aria-label="Items pagination"></nav>
    </section>

    <section id="panel-item-detail" class="demo-panel" hidden data-panel="item-detail">
      <header id="item-detail-header" class="item-detail-header"></header>
      <nav class="detail-tabs" aria-label="Item recipe tabs">
        <button type="button" id="detail-tab-recipes" class="detail-tab" data-detail-tab="recipes">Recipes</button>
        <button type="button" id="detail-tab-uses" class="detail-tab" data-detail-tab="uses">Uses</button>
        <button type="button" id="detail-tab-tags" class="detail-tab" data-detail-tab="tags">Tags</button>
      </nav>
      <section id="detail-panel-recipes" class="detail-panel">
        <nav id="item-recipe-category-tabs" class="emi-category-tabs" hidden aria-label="Recipe categories"></nav>
        <div id="item-recipes" class="recipe-grid recipe-grid-compact"></div>
        <p id="item-recipes-empty" class="demo-empty" hidden>No recipes produce this item.</p>
      </section>
      <section id="detail-panel-uses" class="detail-panel" hidden>
        <nav id="item-uses-category-tabs" class="emi-category-tabs" hidden aria-label="Use categories"></nav>
        <div id="item-uses" class="recipe-grid recipe-grid-compact"></div>
        <p id="item-uses-empty" class="demo-empty" hidden>No recipes use this item as input.</p>
      </section>
      <section id="detail-panel-tags" class="detail-panel" hidden>
        <div id="item-tags-list" class="item-tags-list"></div>
        <p id="item-tags-empty" class="demo-empty" hidden>No tags for this item.</p>
      </section>
    </section>

    <section id="panel-tag-detail" class="demo-panel" hidden data-panel="tag-detail">
      <header id="tag-detail-header" class="item-detail-header item-detail-header--tag"></header>
      <div id="tag-members" class="item-grid"></div>
      <p id="tag-members-empty" class="demo-empty" hidden>No members found for this tag.</p>
      <nav id="tag-pager" class="list-pager" aria-label="Tag members pagination"></nav>
    </section>

    <section id="panel-recipe-detail" class="demo-panel" hidden data-panel="recipe-detail">
      <div class="item-detail-toolbar">
        <button type="button" id="btn-back-items-from-recipe" class="demo-back">← Items</button>
      </div>
      <header id="recipe-detail-header" class="item-detail-header"></header>
      <div id="recipe-single" class="recipe-grid recipe-grid-compact"></div>
      <p id="recipe-single-empty" class="demo-empty" hidden>Recipe layout not found.</p>
    </section>
  </main>

  <div id="tooltip"></div>
  <div id="tag-popover" class="tag-popover" hidden>
    <div class="tag-popover-panel" role="dialog" aria-modal="true">
      <div class="tag-popover-header"></div>
      <div class="tag-popover-stage-wrap"></div>
      <div class="tag-popover-footer"></div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const isDevMode = params.get('dev') === '1';
      const useLocal = params.get('cdn') === 'local' || params.get('cdn') === '0';
      const emiVersion = params.get('emiVersion')
        || document.querySelector('meta[name="emi-renderer-version"]').content;
      const rendererJsFile = isDevMode ? 'emi.js' : 'emi.min.js';
      const script = document.createElement('script');

      if (useLocal) {
        script.src = siteUrl('lib/' + rendererJsFile);
      } else {
        script.src = 'https://cdn.jsdelivr.net/npm/emi-recipe-renderer@'
          + emiVersion + '/dist/' + rendererJsFile;
      }

      function showError(message) {
        document.body.insertAdjacentHTML('beforeend',
          '<p style="color:#f88;padding:1rem">' + message + '</p>');
      }

      script.onerror = function () {
        showError('Failed to load emi-recipe-renderer'
          + (useLocal ? ' from site/lib.' : ' from jsDelivr.')
          + ' Try <code>?cdn=local</code> after <code>npm install</code>.');
      };
      script.onload = function () {
        if (!globalThis.EmiRecipeRenderer) {
          showError('EmiRecipeRenderer missing after script load.');
          return;
        }
        const mcScript = document.createElement('script');
        mcScript.src = siteUrl('minecraft-text.js');
        mcScript.onload = function () {
          const gtScript = document.createElement('script');
          gtScript.src = siteUrl('gtceu-translate.js');
          gtScript.onload = function () {
            const boot = document.createElement('script');
            boot.src = 'app.js';
            boot.onerror = function () {
              showError('Failed to load app.js from this site. Check GitHub Pages deploy includes site/app.js.');
            };
            document.body.appendChild(boot);
          };
          gtScript.onerror = function () {
            showError('Failed to load gtceu-translate.js from this site.');
          };
          document.body.appendChild(gtScript);
        };
        mcScript.onerror = function () {
          showError('Failed to load minecraft-text.js from this site.');
        };
        document.body.appendChild(mcScript);
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
