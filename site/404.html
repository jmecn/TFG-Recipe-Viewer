<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - recipe-viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1319;
      --card: #171d25;
      --text: #e8eef5;
      --muted: #9ca9ba;
      --line: #2a3442;
      --accent: #7db2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #182231 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: color-mix(in oklab, var(--card) 92%, black);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    .code {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .path {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0f141b;
      border: 1px solid var(--line);
      color: #bfd4ef;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 9px 14px;
      color: var(--text);
      background: #1d2530;
    }
    .btn.primary {
      border-color: #3567af;
      background: #244d89;
      color: #eaf3ff;
    }
    .btn:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <main class="card" role="main">
    <p class="code">404</p>
    <h1>页面不存在</h1>
    <p>你访问的地址在当前静态站点中没有对应资源。</p>
    <p>recipe-viewer 已使用 query 路由，请从首页进入，或使用 `/?bundle=...&item=...` 这类链接。</p>
    <div class="path" id="missing-path"></div>
    <div class="actions">
      <a class="btn primary" href="/">返回首页</a>
      <a class="btn" href="/?bundle=_">打开默认 bundle</a>
    </div>
  </main>
  <script>
    document.getElementById('missing-path').textContent =
      location.pathname + location.search + location.hash;
  </script>
</body>
</html>
