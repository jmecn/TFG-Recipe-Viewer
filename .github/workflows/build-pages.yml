name: Build and deploy Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      mwe_version:
        description: minecraft-web-export release tag (empty = ci/build.env)
        required: false
        default: ""
      renderer_version:
        description: emi-recipe-renderer npm version (empty = ci/build.env)
        required: false
        default: ""
      optimize_ref:
        description: emi-bundle-optimize git ref (empty = ci/build.env)
        required: false
        default: ""
      modpack_tag:
        description: Modpack-Modern semver tag (empty = latest release)
        required: false
        default: ""
      export_warmup_ticks:
        description: Ticks after EMI is ready before export (empty = ci/build.env)
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    outputs:
      modpack_tag: ${{ steps.modpack.outputs.modpack_tag }}
      bundle_id: ${{ steps.metadata.outputs.bundle_id }}
      pakku_lock_hash: ${{ steps.metadata.outputs.pakku_lock_hash }}
      emi_bundle_cache_key: ${{ steps.metadata.outputs.emi_bundle }}
      emi_opt_cache_key: ${{ steps.metadata.outputs.emi_opt }}
    steps:
      - name: Checkout viewer
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load CI config
        run: bash scripts/ci-load-config.sh

      - name: Checkout Modpack-Modern
        id: modpack
        env:
          MODPACK_TAG: ${{ github.event.inputs.modpack_tag }}
        run: |
          chmod +x scripts/ci-checkout-modpack.sh
          if [ -n "${MODPACK_TAG:-}" ]; then
            export MODPACK_TAG
          fi
          bash scripts/ci-checkout-modpack.sh

      - name: Prepare bundle metadata
        id: metadata
        env:
          MODPACK_TAG: ${{ steps.modpack.outputs.modpack_tag }}
        run: bash scripts/ci-prepare-metadata.sh

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Install xvfb + OpenGL + OpenAL Soft
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xvfb x11-xserver-utils \
            libgl1 libgl1-mesa-dri \
            libopenal1

      - name: Restore pakku-fetched mods
        id: pakku-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.MODPACK_DIR }}/mods
            ${{ env.MODPACK_DIR }}/resourcepacks
            ${{ env.MODPACK_DIR }}/shaderpacks
          key: pakku-${{ hashFiles(format('{0}/pakku-lock.json', env.MODPACK_DIR)) }}
          restore-keys: |
            pakku-

      - name: Fetch modpack mods (cache miss only)
        if: steps.pakku-restore.outputs.cache-hit != 'true'
        working-directory: ${{ env.MODPACK_DIR }}
        run: java -jar pakku.jar fetch

      - name: Save pakku cache (exact-key miss only)
        if: steps.pakku-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.MODPACK_DIR }}/mods
            ${{ env.MODPACK_DIR }}/resourcepacks
            ${{ env.MODPACK_DIR }}/shaderpacks
          key: ${{ steps.pakku-restore.outputs.cache-primary-key }}

      - name: Install minecraft-web-export
        env:
          MWE_TAG: ${{ github.event.inputs.mwe_version || env.MWE_VERSION }}
        run: bash scripts/ci-install-mwe.sh

      - name: Restore HeadlessMC .minecraft
        id: hmc-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: hmc-${{ env.MC_VERSION }}-forge-${{ env.FORGE_BUILD }}
          restore-keys: |
            hmc-${{ env.MC_VERSION }}-forge-
            hmc-${{ env.MC_VERSION }}-

      - name: Restore emi-export save
        id: emi-save-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: emi-export-${{ env.MC_VERSION }}-${{ hashFiles(format('{0}/pakku-lock.json', env.MODPACK_DIR)) }}
          restore-keys: |
            emi-export-${{ env.MC_VERSION }}-

      - name: Setup HeadlessMC
        run: bash scripts/ci-setup-hmc.sh

      - name: Launch modpack and verify EMI export
        id: mc_launch
        env:
          ALSOFT_DRIVERS: "null"
          EXPORT_WARMUP: ${{ github.event.inputs.export_warmup_ticks || env.EXPORT_WARMUP_TICKS }}
          MWE_JVM_FLAGS: >-
            -Xmx12G
            -Xms4G
            -XX:+UseG1GC
            -Djava.awt.headless=false
            -Dmodernfix.config.mixin.feature.integrated_server_watchdog=false
            -DminecraftWebExport.export.enabled=true
            -DminecraftWebExport.runExportAndExit=true
            -DminecraftWebExport.export.outputDir=${{ env.EXPORT_RAW }}
            -DminecraftWebExport.exportWarmupTicks=${{ env.EXPORT_WARMUP }}
            -DminecraftWebExport.exportTimeoutSeconds=${{ env.EXPORT_TIMEOUT_SECONDS }}
        run: bash scripts/ci-launch-mc-export.sh

      - name: Save emi-export world cache
        if: success() && steps.emi-save-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODPACK_DIR }}/saves/emi-export
          key: ${{ steps.emi-save-restore.outputs.cache-primary-key }}

      - name: Save HeadlessMC .minecraft
        if: success() && steps.hmc-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RUNNER_HOME }}/.minecraft
          key: ${{ steps.hmc-restore.outputs.cache-primary-key }}

      - name: Save raw EMI bundle for optimize job
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.EXPORT_RAW }}/${{ env.EXPORT_BUNDLE_SUBDIR }}
          key: ${{ steps.metadata.outputs.emi_bundle }}

      - name: MC export debug — collect
        if: failure()
        run: bash scripts/ci-collect-export-debug.sh

      - name: MC export debug — upload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mc-export-debug
          path: ci-debug/
          if-no-files-found: ignore

  optimize:
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout viewer
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load CI config
        run: bash scripts/ci-load-config.sh

      - name: Restore raw EMI bundle
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.EXPORT_RAW }}/${{ env.EXPORT_BUNDLE_SUBDIR }}
          key: ${{ needs.export.outputs.emi_bundle_cache_key }}
          fail-on-cache-miss: true

      - name: Checkout emi-bundle-optimize
        uses: actions/checkout@v4
        with:
          repository: jmecn/emi-bundle-optimize
          ref: ${{ github.event.inputs.optimize_ref || env.OPTIMIZE_REF }}
          path: emi-bundle-optimize

      - name: Setup Node (emi-bundle-optimize)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: emi-bundle-optimize/package-lock.json

      - name: Optimize bundle
        id: optimize
        working-directory: emi-bundle-optimize
        run: |
          bash ../scripts/ci-verify-emi-bundle.sh
          npm ci
          node bin/cli.mjs optimize \
            --in "${{ env.EXPORT_BUNDLE }}" \
            --out "${{ env.EXPORT_OPT_STAGING }}" \
            --force \
            --prune-lang

      - name: Save optimized bundle for assemble job
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.EXPORT_OPT_DIR }}
          key: ${{ needs.export.outputs.emi_opt_cache_key }}

      - name: Optimize debug — collect
        if: failure()
        run: bash scripts/ci-collect-export-debug.sh --phase optimize

      - name: Optimize debug — upload
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: optimize-debug
          path: ci-debug/
          if-no-files-found: ignore

  assemble:
    needs: [export, optimize]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout viewer
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load CI config
        run: bash scripts/ci-load-config.sh

      - name: Restore optimized bundle
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.EXPORT_OPT_DIR }}
          key: ${{ needs.export.outputs.emi_opt_cache_key }}
          fail-on-cache-miss: true

      - name: Assemble static site
        env:
          RENDERER_VER: ${{ github.event.inputs.renderer_version || env.RENDERER_VERSION }}
        run: |
          npm pkg set "dependencies.emi-recipe-renderer=${RENDERER_VER}"
          npm install
          npm run copy -- --id "${{ needs.export.outputs.bundle_id }}" "${{ env.EXPORT_OPT_STAGING }}"
          npm run validate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
